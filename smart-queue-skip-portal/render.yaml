services:
  - type: web
    name: smart-queue-skip-portal-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: smart-queue-skip-portal-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
